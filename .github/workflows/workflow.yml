name: CI & Quality

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build & Test with Coverage
        run: mvn clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: troubleshootingApp-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 5

  sonarqube:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: troubleshootingApp-jar
          path: target/

      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B sonar:sonar \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.projectKey=iljakorn_troubleshootingApp

  coveralls:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: troubleshootingApp-jar
          path: target/

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: target/site/jacoco/jacoco.xml

  release:
    needs: [build, sonarqube, coveralls]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build production JAR
        run: mvn clean package -DskipTests
