name: CI & Quality

on:
  push:
    branches: [master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [master, develop]
  release:
    types: [published]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build & Test with Coverage
        run: mvn clean verify

      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B sonar:sonar -Dsonar.token=$SONAR_TOKEN -Dsonar.host.url=https://sonarcloud.io -Dsonar.projectKey=iljakorn_troubleshootingApp

      - name: Maven Test
        run: mvn test jacoco:report

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: target/site/jacoco/jacoco.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: troubleshootingApp-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build-and-analyze
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build production JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.jar
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
              ## Release ${{ github.ref_name }}
              Автоматическая сборка с проверками SonarCloud и Coveralls.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}